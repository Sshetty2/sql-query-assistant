services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./demo_frontend
    ports:
      - "8080:8080"
    environment:
      # In production this would be the Railway private URL
      # e.g. http://api.railway.internal:8000
      API_URL: "http://api:8000"
    depends_on:
      - api
